<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* POPUP CONTAINER */
        .brevo-form-container {
            background: white;
            border-radius: 12px;
            padding: 50px;
            max-width: 550px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        /* HEADER */
        .form-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .form-header h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 44px;
            color: #0A1F44;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .form-header p {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #6A6B4A;
            font-size: 16px;
            line-height: 1.6;
        }

        /* FORM */
        #brevoCustomForm {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* FORM FIELDS */
        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            color: #0A1F44;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input[type="email"],
        input[type="text"] {
            padding: 14px 16px;
            border: 2px solid #E8E8E8;
            border-radius: 8px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 15px;
            color: #0A1F44;
            transition: all 0.3s ease;
        }

        input[type="email"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #B10058;
            box-shadow: 0 0 0 4px rgba(177, 0, 88, 0.1);
        }

        /* CHECKBOX */
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: #B10058;
            flex-shrink: 0;
        }

        .checkbox-group label {
            margin-bottom: 0;
            margin-top: 0;
            font-size: 13px;
            font-weight: 400;
            line-height: 1.5;
        }

        .checkbox-group a {
            color: #B10058;
            text-decoration: underline;
        }

        /* SUBMIT BUTTON */
        button[type="submit"] {
            padding: 16px 24px;
            background-color: #B10058;
            color: #FDFDF3;
            border: none;
            border-radius: 8px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            background-color: #8a0444;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(177, 0, 88, 0.3);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        button[type="submit"]:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* MESSAGE */
        .form-message {
            text-align: center;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            display: none;
        }

        .form-message.success {
            display: block;
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #4caf50;
        }

        .form-message.error {
            display: block;
            background-color: #ffebee;
            color: #c62828;
            border: 1px solid #f44336;
        }

        @media (max-width: 600px) {
            .brevo-form-container {
                padding: 30px 20px;
            }

            .form-header h2 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>

<div class="brevo-form-container">
    <div class="form-header">
        <h2>Clear The Noise 🎯</h2>
        <p>Deine Meditation um zur deiner Ruhe zu finden</p>
    </div>

    <form id="brevoCustomForm">
        <!-- EMAIL -->
        <div class="form-group">
            <label for="email">E-Mail Adresse *</label>
            <input 
                type="email" 
                id="email" 
                name="email" 
                placeholder="deine@email.com"
                required
            >
        </div>

        <!-- NAME -->
        <div class="form-group">
            <label for="name">Dein Name (optional)</label>
            <input 
                type="text" 
                id="name" 
                name="name" 
                placeholder="Wie heißt du?"
            >
        </div>

        <!-- DATENSCHUTZ CHECKBOX -->
        <div class="checkbox-group">
            <input type="checkbox" id="datenschutz" name="datenschutz" required>
            <label for="datenschutz">
                Ich akzeptiere die <a href="/datenschutz.html">Datenschutzerklärung</a> und möchte E-Mails von Isabelle Havers erhalten.
            </label>
        </div>

        <!-- MESSAGE -->
        <div class="form-message" id="formMessage"></div>

        <!-- SUBMIT -->
        <button type="submit">Zugang erhalten</button>
    </form>

    <p style="text-align: center; margin-top: 20px; font-size: 12px; color: #A5A58D;">
        ✓ DSGVO-konform • Keine Spam • Deine Daten sind sicher
    </p>
</div>

<script>
    // DEIN API KEY HIER EINTRAGEN (SICHER - nur auf deiner Website!)
    const BREVO_API_KEY = "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"; // ← Ersetze mit deinem echten Key!
    const BREVO_LIST_ID = 3; // ← Deine List-ID (bei dir: 3)

    document.getElementById('brevoCustomForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const name = document.getElementById('name').value || "Kontakt";
        const messageEl = document.getElementById('formMessage');

        // Button deaktivieren während Submit
        const submitBtn = document.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.textContent = "Wird verarbeitet...";

        try {
            // Zu Brevo-Liste hinzufügen
            const response = await fetch('https://api.brevo.com/v3/contacts', {
                method: 'POST',
                headers: {
                    'accept': 'application/json',
                    'content-type': 'application/json',
                    'api-key': BREVO_API_KEY
                },
                body: JSON.stringify({
                    email: email,
                    attributes: {
                        FIRSTNAME: name
                    },
                    listIds: [BREVO_LIST_ID],
                    updateEnabled: true
                })
            });

            if (response.ok || response.status === 409) { // 409 = Kontakt existiert bereits
                messageEl.textContent = "✓ Danke! Schau in dein E-Mail-Postfach (auch im SPAM). 📬";
                messageEl.classList.add('success');
                document.getElementById('brevoCustomForm').reset();
                
                // Nach 3 Sekunden Formular zurücksetzen
                setTimeout(() => {
                    messageEl.classList.remove('success');
                    messageEl.textContent = '';
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Zugang erhalten";
                }, 3000);
            } else {
                throw new Error('API Error');
            }
        } catch (error) {
            console.error('Error:', error);
            messageEl.textContent = "❌ Etwas ist schiefgegangen. Versuche es später nochmal.";
            messageEl.classList.add('error');
            submitBtn.disabled = false;
            submitBtn.textContent = "hier downloaden";
        }
    });
</script>

</body>
</html>
